<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms Survival</title>
    <style>
      body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: monospace; }
      #loader {
        position: fixed; inset: 0; background: #111; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s;
      }
      .spinner {
        width: 50px; height: 50px; border: 4px solid #333; border-top: 4px solid #ffcc00;
        border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9998; display: flex; align-items: center; justify-content: center; }
      .hidden { display: none !important; opacity: 0; pointer-events: none; }
      .card { background: #222; padding: 2rem; border-radius: 8px; text-align: center; border: 2px solid #555; }
      .card strong { font-size: 1.5rem; color: #ffcc00; display: block; margin-bottom: 10px; }
      .hud { position: fixed; top: 10px; left: 10px; z-index: 9990; pointer-events: none; }
      .hud .label { background: rgba(0,0,0,0.5); padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #444; }
      #death-overlay { position: fixed; inset: 0; background: rgba(100,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
      #vignette {
        position: fixed; inset: 0; z-index: 9991; pointer-events: none;
        box-shadow: inset 0 0 120px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,0,0,0.4);
      }
      #pause-menu {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9997;
        display: flex; align-items: center; justify-content: center;
      }
      #pause-menu.hidden { display: none; }
      .pause-card { background: #1a1a1a; padding: 2.5rem; border-radius: 4px; text-align: center; border: 1px solid #444; min-width: 280px; }
      .pause-card h2 { color: #efe2b0; letter-spacing: 0.15em; text-transform: uppercase; font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 400; }
      .pause-btn {
        display: block; width: 100%; padding: 12px 0; margin-bottom: 10px; font-family: monospace;
        font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
        background: transparent; color: #efe2b0; border: 1px solid rgba(239,226,176,0.3);
        transition: all 0.2s;
      }
      .pause-btn:hover { background: rgba(239,226,176,0.1); border-color: #efe2b0; }
      .pause-btn.danger:hover { background: rgba(200,50,50,0.15); border-color: #c44; color: #f66; }
      #victory-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        animation: fadeIn 1s ease;
      }
      #victory-overlay.hidden { display: none; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .victory-card { text-align: center; }
      .victory-card h1 { color: #ffcc00; font-size: 2.5rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; font-weight: 400; }
      .victory-card p { color: rgba(239,226,176,0.7); margin-bottom: 2rem; font-size: 0.95rem; }
      .victory-card .pause-btn { display: inline-block; width: auto; padding: 12px 40px; }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div>Cargando y Generando el Nivel...</div>
    </div>

    <div id="vignette"></div>

    <div class="overlay hidden">
      <div class="card">
        <strong>Haz clic para iniciar</strong>
        <p>WASD para moverte. Shift para correr. Ctrl para agacharse. Esc para pausar.</p>
      </div>
    </div>

    <div class="hud hidden">
      <div id="vitals-container">
        <div class="vital-row">
          <span class="vital-label">HP</span>
          <div class="vital-bar"><div id="health-fill"></div></div>
          <span id="health-text" class="vital-num">100</span>
        </div>
        <div class="vital-row">
          <span class="vital-label">STA</span>
          <div class="vital-bar"><div id="stamina-fill"></div></div>
        </div>
        <div class="vital-row">
          <span class="vital-label">BAT</span>
          <div class="vital-bar"><div id="battery-fill"></div></div>
        </div>
      </div>
      <div class="label">Se escucha algo...</div>
      <div class="label">Encuentra la salida</div>
    </div>

    <div id="pause-menu" class="hidden">
      <div class="pause-card">
        <h2>PAUSA</h2>
        <button class="pause-btn" onclick="resumeGame()">Continuar</button>
        <button class="pause-btn" onclick="restartLevel()">Reiniciar nivel</button>
        <button class="pause-btn danger" onclick="backToMenu()">Salir al menú</button>
      </div>
    </div>

    <div id="victory-overlay" class="hidden">
      <div class="victory-card">
        <h1>ESCAPASTE</h1>
        <p>Encontraste la salida de los Backrooms...</p>
        <button class="pause-btn" onclick="backToMenu()">Volver al menú</button>
      </div>
    </div>

    <div id="death-overlay" class="hidden">
      <div class="card">
        <strong>Has muerto</strong>
        <p>Un obstáculo te ha eliminado...</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
