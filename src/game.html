<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms Survival</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: monospace;
      }
      #loader {
        position: fixed;
        inset: 0;
        background: #111;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #333;
        border-top: 4px solid #ffcc00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hidden {
        display: none !important;
        opacity: 0;
        pointer-events: none;
      }
      .card {
        background: #222;
        padding: 2rem;
        border-radius: 8px;
        text-align: center;
        border: 2px solid #555;
      }
      .card strong {
        font-size: 1.5rem;
        color: #ffcc00;
        display: block;
        margin-bottom: 10px;
      }
      .hud {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9990;
        pointer-events: none;
      }
      .hud .label {
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 10px;
        margin-bottom: 5px;
        border-radius: 4px;
        border: 1px solid #444;
      }
      #death-overlay {
        position: fixed;
        inset: 0;
        background: rgba(100, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div>Cargando y Generando el Nivel...</div>
    </div>
    <div class="overlay hidden">
      <div class="card">
        <strong>Haz clic para iniciar</strong>
        <p>
          WASD para moverte. Shift para correr. Ctrl para agacharse. Esc para
          pausar.
        </p>
      </div>
    </div>
    <div class="hud hidden">
      <div class="label">Se escucha algo...</div>
      <div class="label">Encuentra la salida</div>
    </div>
    <div id="death-overlay" class="hidden">
      <div class="card">
        <strong>Has muerto</strong>
        <p>Un obstáculo te ha eliminado...</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
